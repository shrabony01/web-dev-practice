<body>
    <ol>
        <li class="odd">i am 1</li>
        <li id="second">i am 2</li>
        <li class="odd third">i am 3</li>
        <li class="size-24" id="fourth">i am 4</li>
        <li class="odd">i am 5</li>
    </ol>
    
</body>
